<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 欢迎使用本服务 - 系统运行中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        /* 玻璃拟物化导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        /* 核心展示区 */
        .hero {
            text-align: center;
            padding: 80px 20px 60px;
            color: white;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .hero p {
            font-size: 22px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        /* 特性卡片区 */
        .features {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }

        .card p {
            color: #666;
            line-height: 1.6;
            font-size: 16px;
        }

        /* 底部按钮区 */
        .actions {
            text-align: center;
            padding-bottom: 80px;
        }

        .btn {
            display: inline-block;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .btn-white {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-white:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-outline:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 36px; }
            .hero p { font-size: 18px; }
            .navbar { padding: 15px 20px; }
            .nav-links a { margin-left: 15px; font-size: 14px; }
            .btn { display: block; margin: 15px auto; max-width: 280px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">🚀 飞往火星的路上</a>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/api/docs">文档</a>
        </div>
    </nav>

    <section class="hero">
        <div class="status-badge">
            <span class="status-dot"></span>
            系统运行正常
        </div>
        <h1>欢迎使用 API 服务</h1>
        <p>这是一个基于框架构建的高性能、高可用后端服务。一切就绪，随时准备为您提供稳定的服务.</p>
    </section>

    <section class="features">
        <div class="card">
            <div class="card-icon">⚡</div>
            <h3>极速响应</h3>
            <p>采用轻量级框架，去除冗余依赖，确保每一次 API 请求都能在毫秒级完成响应。</p>
        </div>
        <div class="card">
            <div class="card-icon">🔒</div>
            <h3>安全可靠</h3>
            <p>内置完善的中间件鉴权机制与错误拦截系统，保障数据传输与接口调用的绝对安全。</p>
        </div>
        <div class="card">
            <div class="card-icon">🛠️</div>
            <h3>易于扩展</h3>
            <p>清晰的 MVC 架构与依赖注入设计，让业务逻辑的迭代与功能扩展变得轻而易举。</p>
        </div>
    </section>

    <section class="actions">
        <a href="/api/docs" class="btn btn-white">📖 查看 API 文档</a>
        <a href="mailto:jeanslw@qq.com" class="btn btn-outline">💬 联系技术支持</a>
    </section>

    <footer class="footer">
        &copy; 2026 © Blues.inc  Powered by Slim Framework.
    </footer>

</body>
</html>
