<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Devops-Glue API 文档</title>
  <link rel="stylesheet" href="/assets/swagger-ui.css">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
    .topbar { display: none; }
    .swagger-ui .info .title { font-size: 28px; }
  </style>
</head>
<body>
  <div style="background:#f8f9fa;padding:8px 20px;text-align:right;border-bottom:1px solid #e5e7eb;font-size:13px;">
    <a href="/" style="color:#4f46e5;text-decoration:none;">🏠 返回首页</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="/assets/swagger-ui-bundle.js"></script>
  <script src="/assets/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: '/api/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "StandaloneLayout",
        defaultModelsExpandDepth: -1,
        defaultModelExpandDepth: 1,
        requestInterceptor: function(req) {
          req.url = req.url.replace(/%2[Ff]/g, '/');
          // 从 URL 参数读取 token，注入所有请求
          var m = location.search.match(/[?&]token=([^&]+)/);
          if (m) { req.headers.Authorization = 'Bearer ' + decodeURIComponent(m[1]); }
          return req;
        }
      });
    };
  </script>
</body>
</html>
