name: Security Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  security-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Full history to check all commits

    - name: Check for hardcoded credentials
      run: |
        echo "🔍 检查代码中是否有硬编码的敏感信息..."
        
        # 检查常见的敏感信息模式
        if grep -r "glpat-\|1165125392\|Admin2345" . \
            --exclude-dir=.git \
            --exclude-dir=vendor \
            --exclude-dir=node_modules \
            --exclude=".env*" \
            --exclude="*.md" \
            2>/dev/null; then
          echo "❌ 发现硬编码的敏感信息！"
          exit 1
        else
          echo "✅ 未发现硬编码的敏感信息"
        fi

    - name: Check .env files not tracked
      run: |
        echo "🔍 检查 .env 文件是否被 Git 追踪..."
        
        # 检查 .env 文件是否被提交
        if git ls-files | grep -E "^\.env"; then
          echo "❌ .env 文件不应被提交到 Git！"
          exit 1
        else
          echo "✅ .env 文件不在 Git 追踪中"
        fi

    - name: Verify .gitignore rules
      run: |
        echo "🔍 验证 .gitignore 配置..."
        
        # 检查 .gitignore 是否包含 .env 规则
        if grep -q "^\.env" .gitignore; then
          echo "✅ .gitignore 包含 .env 规则"
        else
          echo "❌ .gitignore 缺少 .env 规则！"
          exit 1
        fi

    - name: Check config/settings.php for hardcoded values
      run: |
        echo "🔍 检查 settings.php 中是否有硬编码的敏感值..."
        
        # 检查是否使用了 getenv() 而不是硬编码的 token
        if grep -E "token.*=>.*['\"](?!getenv)" config/settings.php 2>/dev/null; then
          echo "⚠️  检测到可能的硬编码 token（检查是否为占位符）"
        fi
        
        if grep -E "password.*=>.*['\"](?!getenv)" config/settings.php 2>/dev/null; then
          echo "⚠️  检测到可能的硬编码 password（检查是否为占位符）"
        fi
        
        echo "✅ settings.php 检查完成"

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: curl, json

    - name: Check PHP syntax
      run: |
        echo "🔍 检查 PHP 语法..."
        php bin/syntax-check.php

    - name: Run pre-deploy checks
      run: |
        echo "🔍 运行部署前检查..."
        php bin/pre-deploy-check.php

    - name: Comment on PR
      if: github.event_name == 'pull_request' && success()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ 安全性检查通过！\n\n- ✅ 未发现硬编码的敏感信息\n- ✅ .env 文件未被追踪\n- ✅ PHP 语法正确\n- ✅ 所有部署前检查通过'
          })

  syntax-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3

    - name: Run syntax check
      run: php bin/syntax-check.php

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3

    - name: Run PHP linter
      run: |
        echo "🔍 PHP Linting..."
        for file in config/*.php src/**/*.php public/*.php; do
          echo "Checking $file..."
          php -l "$file" || exit 1
        done
        echo "✅ All files passed linting"
