# 部署用 docker-compose — 从 Harbor 拉镜像，不在服务器上构建
# 用法: IMAGE_TAG=v1.0 docker compose -f docker-compose.deploy.yml up -d
#
# 放到目标服务器上，如 /opt/devops-glue/docker-compose.yml

services:
  devops-glue:
    image: 192.168.137.5/mycode/devops-glue:${IMAGE_TAG:-latest}
    container_name: devops-glue
    env_file:
      - .env
    volumes:
      - ./.env:/app/config/.env:ro
      - ./data:/app/config/data
      - ./logs:/data/logs/ci-platform
    ports:
      - "8080:80"
    restart: unless-stopped
