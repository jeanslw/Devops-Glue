# Devops-Glue API — 推荐 MySQL / MariaDB
# 已内置 MySQL 8.4 容器，和 cd_service 共用 devops_glue 库

services:
  devops-glue:
    build:
      context: ..
      dockerfile: Dockerfile
    image: devops-glue:latest
    container_name: devops-glue
    env_file:
      - ../config/.env
    volumes:
      - ../config/.env:/app/config/.env:ro
      - ../config/docker/nginx.conf:/etc/nginx/sites-available/default:ro
      - ../config/docker/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-custom.conf:ro
      - ../config/docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
      #- ../config/data:/app/config/data
      - ../applog:/data/logs/ci-platform
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: devops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root123}
      MYSQL_DATABASE: ${DB_NAME:-devops_glue}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql-data:

# ── SQLite 模式（可选，单机运行）：注释掉 depends_on 和 mysql 服务，.env 中切换到 sqlite ──
